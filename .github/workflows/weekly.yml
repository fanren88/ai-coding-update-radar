name: Generate weekly static digest

on:
  schedule:
    - cron: "23 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: coding-radar-content
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Generate digest JSON
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          AI_MODEL_PRIMARY: ${{ vars.AI_MODEL_PRIMARY || 'openai/gpt-5.4-mini' }}
          AI_MODEL_FALLBACK: ${{ vars.AI_MODEL_FALLBACK || 'anthropic/claude-haiku-4.5' }}
        run: npm run weekly
      - run: npm test && npm run typecheck && npm run build
      - name: Detect weekly changes
        id: changes
        run: |
          if git diff --quiet -- content; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit weekly content
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content
          git commit -m "content: generate weekly coding digest"
          git push
      - name: Trigger Vercel static rebuild
        if: steps.changes.outputs.changed == 'true' && secrets.VERCEL_DEPLOY_HOOK != ''
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: curl --fail-with-body --retry 3 --retry-all-errors -X POST "$VERCEL_DEPLOY_HOOK"
